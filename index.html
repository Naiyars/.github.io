<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naiyar Shaman | Aerospace Systems Engineering</title>

  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Familjen Grotesk", sans-serif;
      background: #000;
      color: #fff;
    }

    .container {
      width: min(100% - 32px, 1200px);
      margin: auto;
    }

    .section {
      padding: 80px 0;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #050505;
    }

    /* ✅ FIXED IMAGE BEHAVIOR */
    .feature-visual {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .feature-visual img {
      width: 100%;
      height: auto;
      display: block;
      max-width: 100%;
    }

    /* ❌ REMOVED DARK OVERLAY COMPLETELY */
    .feature-visual::after {
      display: none;
    }

    .feature-copy {
      padding: 24px;
      background: rgba(0,0,0,0.7);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    p {
      color: rgba(255,255,255,0.7);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      border: 1px solid #fff;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    @media (max-width: 900px) {
      .feature-grid {
        grid-template-columns: 1fr;
      }

      .feature-visual {
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
    }
  </style>
</head>

<body>

  <section class="section">
    <div class="container">

      <h2>PROJECT AUREVO — LUNAR SURFACE POWER ARCHITECTURE</h2>
      <p>
        Advanced Utilization of Resources for Energy & Viability Off-Earth.
      </p>

      <div class="feature-grid">

        <div class="feature-visual">
          <img src="aurevo-cinematic.png" alt="AUREVO render">
        </div>

        <div class="feature-copy">
          <h1>Designed for sustained lunar operations</h1>
          <p>
            Dual fission systems, long-range transmission, and solar-driven RTES storage.
          </p>

          <a class="btn">Explore Project</a>
        </div>

      </div>

    </div>
  </section>

</body>
</html>
